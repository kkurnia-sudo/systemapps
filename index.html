<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SBR Putra</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            
            /* Konfigurasi Background Foto */
            background-image: url('bg-login.jpg'); /* Pastikan file foto di GitHub bernama bg-login.jpg */
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            
            /* Efek gelap transparan agar form login tetap terbaca jelas */
            background-color: rgba(0, 0, 0, 0.4); 
            background-blend-mode: overlay;

            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        
        .login-container { 
            /* Background putih agak transparan dengan efek blur */
            background: rgba(128, 128, 128, 0.5); 
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px); /* Dukungan untuk browser Safari */
            
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); 
            text-align: center; 
            width: 90%; 
            max-width: 360px; 
        }

        .icon-lock {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }
        
        h2 { 
            margin: 0 0 5px 0; 
            color: #1c1cc9; 
            font-size: 22px;
            font-weight: 700;
        }

        p.subtitle {
            color: #0f0f69;
            font-size: 14px;
            margin: 0 0 25px 0;
        }
        
        .pin-input { 
            font-size: 18px; 
            text-align: center; 
            width: 140px; 
            padding: 15px; 
            margin: 10px 0 25px 0; 
            letter-spacing: 12px; 
            background-color: #f9fafb;
            border: 2px solid #e5e7eb; 
            border-radius: 16px; 
            outline: none;
            color: #111827;
            font-weight: bold;
            transition: all 0.3s ease; 
        }

        .pin-input:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        .btn-login { 
            background: #2563eb; 
            color: white; 
            border: none; 
            padding: 15px 20px; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            width: 100%; 
            transition: all 0.2s ease; 
        }
        
        .btn-login:active { 
            background: #1d4ed8; 
            transform: scale(0.96); 
        }
        
        #pesan-error { 
            color: #ef4444; 
            background: #fef2f2;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px; 
            display: none; 
            font-size: 13px; 
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <span class="icon-lock">🔐</span>
        <h2>kkurnia Systems</h2>
        <p class="subtitle">Masukkan PIN untuk mengakses sistem</p>
        
        <input type="password" id="inputPin" class="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••">
        
        <button class="btn-login" onclick="cekLogin()">Masuk Dashboard</button>
        
        <div id="pesan-error">PIN yang Anda masukkan salah!</div>
    </div>

    <script>
        // Inisialisasi Supabase
        const supabaseUrl = 'https://acpkdnktanrucyfyhckw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcGtkbmt0YW5ydWN5ZnloY2t3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTE2NzksImV4cCI6MjA5OTc2NzY3OX0.CyBFYglE50qCnnj9gLjj0zDVZG4dmEs6pWYWkJns41U'; 
        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function cekLogin() {
            const pin = document.getElementById('inputPin').value;
            const pesanError = document.getElementById('pesan-error');
            const btnLogin = document.querySelector('.btn-login');

            pesanError.style.display = 'none';

            if (pin.length !== 4) {
                pesanError.innerText = "PIN harus 4 digit!";
                pesanError.style.display = 'block';
                return;
            }

            // Ubah teks tombol saat loading
            const teksAsli = btnLogin.innerText;
            btnLogin.innerText = "Memeriksa...";
            btnLogin.disabled = true;

            try {
                // Mengecek ke tabel akses_login
                const { data, error } = await supabaseClient
                    .from('akses_login')
                    .select('*')
                    .eq('pin', pin)
                    .single();

                if (error) throw error;

                if (data) {
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error("Error pencarian data:", err.message);
                pesanError.innerText = "PIN yang Anda masukkan salah!";
                pesanError.style.display = 'block';
                
                // Kembalikan teks tombol jika gagal
                btnLogin.innerText = teksAsli;
                btnLogin.disabled = false;
                
                // Kosongkan form PIN agar bisa langsung diisi ulang
                document.getElementById('inputPin').value = '';
                document.getElementById('inputPin').focus();
            }
        }
    </script>
</body>
</html>
