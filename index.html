<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SBR Putra Food</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 style="color: #0f172a; margin-bottom: 5px;">SBR Putra Food</h2>
            <p style="color: #64748b; margin-bottom: 25px; font-size: 13px;">Masukkan 6 Digit PIN Akses</p>
            
            <form id="loginForm">
                <input type="password" id="pin" class="pin-input" required maxlength="6" pattern="[0-9]*" inputmode="numeric" placeholder="••••••">
                <button type="submit" id="btnLogin">MASUK</button>
            </form>
        </div>
    </div>

    <script>
        // MASUKKAN KUNCI SUPABASE ANDA DI SINI:
        const SUPABASE_URL = "https://acpkdnktanrucyfyhckw.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_CJT5MhIGYNKOGOcyab_F2Q_e9qGV3Bk";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const HIDDEN_EMAIL = "admin@sbrputrafood.com"; // Email yang dibuat di Langkah 1

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const pinEntered = document.getElementById('pin').value;
            const btn = document.getElementById('btnLogin');
            btn.innerText = "Tunggu..."; btn.disabled = true;

            const { error } = await supabase.auth.signInWithPassword({
                email: HIDDEN_EMAIL, password: pinEntered,
            });

            if (error) {
                alert("PIN Salah!");
                btn.innerText = "MASUK"; btn.disabled = false;
                document.getElementById('pin').value = ""; 
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
