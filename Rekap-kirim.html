<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekap Pengiriman - SBR Putra Food</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- html2canvas for PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <style>
        .receipt-scroll::-webkit-scrollbar { width: 5px; }
        .receipt-scroll::-webkit-scrollbar-track { background: transparent; }
        .receipt-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .receipt-scroll::-webkit-scrollbar-thumb { background: #475569; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans min-h-screen relative pb-44 transition-colors duration-300">

    <div class="max-w-md mx-auto p-5 space-y-5">
        
        <!-- Header -->
        <div class="text-center pb-3 border-b border-gray-200 dark:border-gray-700">
            <h1 class="text-2xl font-extrabold tracking-tight text-gray-900 dark:text-white">SBR Putra Food</h1>
            <h2 class="text-md font-medium text-gray-500 dark:text-gray-400">Rekap Pengiriman Harian</h2>
        </div>

        <!-- Date Input -->
        <div class="flex items-center space-x-3 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 relative">
            <label for="tanggal" class="font-semibold whitespace-nowrap text-sm">Tanggal :</label>
            <input type="text" id="tanggal" class="flex-1 px-3 py-1.5 bg-transparent border-b-2 border-gray-200 dark:border-gray-600 focus:outline-none focus:border-primary text-sm font-medium">
        </div>

        <!-- Input Form Section -->
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Agen</label>
                    <select id="agen" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Mobil</label>
                    <select id="mobil" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Driver</label>
                    <select id="driver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Co-Driver</label>
                    <select id="codriver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"></select>
                </div>
            </div>

            <button onclick="tambahKiriman()" class="w-full flex items-center justify-center space-x-2 py-2.5 border-2 border-dashed border-primary text-primary hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg font-bold text-sm transition-colors active:scale-[0.98]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>Tambah Baris Kiriman</span>
            </button>
        </div>

        <!-- Draft Antrean -->
        <div id="draftSection" class="pt-2 hidden">
            <h2 class="text-sm font-bold text-primary mb-2 px-1">Antrean Belum Disimpan</h2>
            <div class="border border-blue-200 dark:border-blue-900/50 bg-blue-50/50 dark:bg-gray-800 rounded-xl p-2">
                <div id="draftContainer" class="space-y-2 max-h-[220px] overflow-y-auto receipt-scroll pr-1">
                    <!-- Draft items -->
                </div>
            </div>
        </div>

        <!-- History Section Dari Database -->
        <div class="pt-2 border-t border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between mb-2 px-1">
                <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100">Riwayat</h2>
                <select id="filterWaktu" onchange="handleFilterChange()" class="text-xs font-medium bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-2 py-1.5 outline-none focus:ring-2 focus:ring-primary text-gray-700 dark:text-gray-300">
                    <option value="hari_ini">Hari Ini</option>
                    <option value="kemarin">Kemarin</option>
                    <option value="tiga_hari">3 Hari Terakhir</option>
                    <option value="rentang">Pilih Rentang...</option>
                </select>
            </div>
            
            <div id="dateRangeDiv" class="hidden flex-wrap gap-2 mb-3 p-2 bg-gray-100 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                <div class="flex w-full items-center space-x-2">
                    <input type="text" id="startDate" placeholder="Mulai" class="flex-1 text-xs p-1.5 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200 outline-none text-center">
                    <span class="text-xs font-bold text-gray-500">sd</span>
                    <input type="text" id="endDate" placeholder="Akhir" class="flex-1 text-xs p-1.5 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200 outline-none text-center">
                </div>
                <button onclick="loadRiwayatDB()" class="w-full bg-primary text-white text-xs py-2 rounded-md font-bold mt-1">Cari Data</button>
            </div>
            
            <!-- Flatbox Riwayat Minimalis -->
            <div class="border border-gray-200 dark:border-gray-700 bg-gray-100/50 dark:bg-gray-800/50 rounded-xl p-2">
                <div id="riwayatDbContainer" class="space-y-1.5 max-h-[300px] overflow-y-auto receipt-scroll pr-1">
                    <p class="text-center text-xs text-gray-500 py-4 italic">Memuat data...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Action Button -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-700 p-4 pb-6 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-10">
        <div class="max-w-md mx-auto space-y-3">
            <button onclick="simpanKeDatabase()" id="btnSimpanDB" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition transform active:scale-[0.98] flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                <span>Simpan Antrean ke Database</span>
            </button>
            <button onclick="tampilkanPratinjau()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition transform active:scale-[0.98] flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                <span>Pratinjau & Cetak Riwayat</span>
            </button>
        </div>
    </div>

    <!-- Modal Edit Database -->
    <div id="modalEdit" class="fixed inset-0 bg-black/70 z-50 hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300 px-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl p-5 transform scale-95 transition-transform duration-300 shadow-2xl" id="modalEditContent">
            <h3 class="font-bold text-lg mb-4 text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-2">Edit / Hapus Data</h3>
            
            <div class="space-y-3 mb-6">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Agen</label>
                    <select id="editAgen" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Mobil</label>
                    <select id="editMobil" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Driver</label>
                    <select id="editDriver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Co-Driver</label>
                    <select id="editCodriver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none"></select>
                </div>
            </div>

            <div class="flex flex-col space-y-2.5">
                <button onclick="simpanEdit()" id="btnSimpanEdit" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md transition active:scale-[0.98]">Simpan Perubahan</button>
                <button onclick="hapusDataDB()" id="btnHapusDB" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-md transition active:scale-[0.98]">Hapus Data Riwayat</button>
                <button onclick="tutupEditModal()" class="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 font-bold py-3 rounded-xl transition active:scale-[0.98]">Batal</button>
            </div>
        </div>
    </div>

    <!-- Modal Pratinjau & Cetak -->
    <div id="modalPreview" class="fixed inset-0 bg-black/80 z-50 hidden flex-col justify-end opacity-0 transition-opacity duration-300">
        <div class="bg-gray-100 dark:bg-gray-900 w-full rounded-t-3xl pt-5 pb-8 px-4 flex flex-col h-[90vh] transform translate-y-full transition-transform duration-300" id="modalContent">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-bold text-lg">Pratinjau & Aksi</h3>
                <button onclick="tutupPratinjau()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto receipt-scroll flex justify-center mb-6">
                <div id="areaStruk" class="bg-white p-5 shadow-sm w-[340px] text-black font-mono text-[12px] leading-snug relative rounded-sm mx-auto">
                    <div class="text-center pb-2 mb-3 border-b-2 border-black border-dashed">
                        <h2 class="text-[18px] font-extrabold uppercase tracking-widest">SBR Putra Food</h2>
                        <p class="font-bold mt-1 text-[13px]">REKAP PENGIRIMAN</p>
                    </div>
                    <div class="mb-3 font-bold flex justify-between border-b-2 border-black pb-2 text-[11px]">
                        <span>TANGGAL:</span>
                        <span id="strukTanggal" class="text-right"></span>
                    </div>
                    <div id="strukDaftarKiriman" class="space-y-3 pb-2">
                        <!-- Items go here -->
                    </div>
                    <div class="text-center mt-6 pt-3 border-t-2 border-black border-dashed">
                        <p class="mb-8">Mengetahui,</p>
                        <p class="font-bold border-b border-black inline-block px-8 pb-1">Admin / Logistik</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 shrink-0 px-2">
                <button onclick="simpanPNG()" class="col-span-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md flex items-center justify-center space-x-2 transition active:scale-[0.98]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span>Simpan sbg Gambar (PNG)</span>
                </button>
                <button onclick="cetakBluetooth(32)" class="bg-gray-800 dark:bg-gray-700 hover:bg-gray-900 text-white font-bold py-3 rounded-xl shadow-md transition active:scale-[0.98] text-sm">
                    Cetak BT (58mm)
                </button>
                <button onclick="cetakBluetooth(48)" class="bg-gray-800 dark:bg-gray-700 hover:bg-gray-900 text-white font-bold py-3 rounded-xl shadow-md transition active:scale-[0.98] text-sm">
                    Cetak BT (80mm)
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SETUP SUPABASE & VARIABEL ---
        const SUPABASE_URL = 'https://acpkdnktanrucyfyhckw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcGtkbmt0YW5ydWN5ZnloY2t3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTE2NzksImV4cCI6MjA5OTc2NzY3OX0.CyBFYglE50qCnnj9gLjj0zDVZG4dmEs6pWYWkJns41U';
        
        let supabaseClient = null;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.warn("Supabase tidak dapat diinisialisasi.");
        }

        let listRekapan = []; 
        let dataRiwayatDB = []; 
        let currentEditId = null; 

        window.onload = () => {
            flatpickr("#tanggal", { dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y", defaultDate: "today", disableMobile: true });
            flatpickr("#startDate", { dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y", disableMobile: true });
            flatpickr("#endDate", { dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y", disableMobile: true });

            loadDataDropdown();
            loadRiwayatDB();
        };

        const formatTglDB = (dateObj) => {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // --- 2. FETCH DATA DROPDOWN ---
        async function loadDataDropdown() {
            let dataBerhasilDiambil = false;
            if (supabaseClient) {
                try {
                    const { data: agen } = await supabaseClient.from('data-agen').select('nama_agen').order('nama_agen', { ascending: true });
                    const { data: driver } = await supabaseClient.from('driver-list').select('nama_karyawan').order('nama_karyawan', { ascending: true });
                    const { data: mobil } = await supabaseClient.from('data-kendaraan').select('tipe_mobil').order('tipe_mobil', { ascending: true });

                    if (agen || driver || mobil) {
                        populateSelect('agen', agen, 'nama_agen', 'Pilih Agen...');
                        populateSelect('driver', driver, 'nama_karyawan', 'Pilih Driver...');
                        
                        populateSelect('codriver', driver, 'nama_karyawan', 'Pilih Co-Driver... (Opsional)');
                        const codriverSelect = document.getElementById('codriver');
                        const optionKosong = document.createElement('option');
                        optionKosong.value = "- Kosong -"; optionKosong.text = "- Kosong -";
                        codriverSelect.insertBefore(optionKosong, codriverSelect.children[1]);

                        populateSelect('mobil', mobil, 'tipe_mobil', 'Pilih Mobil...');
                        dataBerhasilDiambil = true;
                    }
                } catch (error) {}
            }

            if (!dataBerhasilDiambil) isiDropdownDummy();

            // Salin daftar opsi ke dropdown modal Edit
            document.getElementById('editAgen').innerHTML = document.getElementById('agen').innerHTML;
            document.getElementById('editMobil').innerHTML = document.getElementById('mobil').innerHTML;
            document.getElementById('editDriver').innerHTML = document.getElementById('driver').innerHTML;
            document.getElementById('editCodriver').innerHTML = document.getElementById('codriver').innerHTML;
        }

        function populateSelect(id, data, key, placeholder) {
            const select = document.getElementById(id);
            select.innerHTML = `<option value="">${placeholder}</option>`;
            if(data && data.length > 0) {
                data.forEach(item => {
                    if(item[key]) select.innerHTML += `<option value="${item[key]}">${item[key]}</option>`;
                });
            }
        }

        function isiDropdownDummy() {
            populateSelect('agen', [{nama: 'Agen Lembang'}, {nama: 'Agen Cimahi'}], 'nama', 'Pilih Agen...');
            populateSelect('driver', [{nama: 'Agus'}, {nama: 'Budi'}], 'nama', 'Pilih Driver...');
            populateSelect('codriver', [{nama: '- Kosong -'}, {nama: 'Agus'}], 'nama', 'Pilih Co-Driver...');
            populateSelect('mobil', [{plat_nomor: 'D 1234 XY (Brio)'}, {plat_nomor: 'D 5678 ZA'}], 'plat_nomor', 'Pilih Mobil...');
        }

        // --- 3. LOGIC ANTREAN (DRAFT) ---
        function tambahKiriman() {
            const agen = document.getElementById('agen').value;
            const driver = document.getElementById('driver').value;
            const codriver = document.getElementById('codriver').value;
            const mobil = document.getElementById('mobil').value;
            const tanggal = document.getElementById('tanggal').value; 
            
            if(!agen || !driver || !mobil) return alert('Agen, Driver, dan Mobil harus dipilih!');

            listRekapan.push({
                id: Date.now(),
                tanggal: tanggal, agen: agen, driver: driver,
                codriver: (codriver === '- Kosong -' || !codriver) ? '' : codriver, mobil: mobil
            });
            renderDraft();

            document.getElementById('agen').value = ''; document.getElementById('driver').value = '';
            document.getElementById('codriver').value = ''; document.getElementById('mobil').value = '';
        }

        function hapusDraft(id) {
            listRekapan = listRekapan.filter(item => item.id !== id);
            renderDraft();
        }

        function renderDraft() {
            const section = document.getElementById('draftSection');
            const container = document.getElementById('draftContainer');
            
            if(listRekapan.length === 0) return section.classList.add('hidden');
            
            section.classList.remove('hidden');
            container.innerHTML = '';
            
            // DESAIN MINIMALIS ANTREAN
            listRekapan.forEach((item, index) => {
                container.innerHTML += `
                    <div class="bg-blue-50 dark:bg-blue-900/20 py-2 px-2.5 rounded-lg shadow-sm border border-blue-100 dark:border-blue-800 fade-in relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
                        <div class="pl-1.5 flex flex-col">
                            <div class="flex justify-between items-center mb-0.5">
                                <span class="font-bold text-xs text-blue-900 dark:text-blue-100 truncate pr-2">${index + 1}. ${item.agen}</span>
                                <button onclick="hapusDraft(${item.id})" class="text-red-500 hover:bg-red-100 dark:hover:bg-red-900/30 p-1 rounded transition shrink-0" title="Hapus">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                            <div class="flex flex-wrap gap-x-3 gap-y-0.5 text-[10px] text-blue-800 dark:text-blue-300 leading-tight">
                                <p>Mbl: <span class="font-bold">${item.mobil}</span></p>
                                <p>Drv: <span class="font-bold">${item.driver}</span></p>
                                <p>Co: <span class="font-bold">${item.codriver || '-'}</span></p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // --- 4. LOGIC RIWAYAT DATABASE & FILTER ---
        function handleFilterChange() {
            const val = document.getElementById('filterWaktu').value;
            const rangeDiv = document.getElementById('dateRangeDiv');
            if (val === 'rentang') { rangeDiv.classList.remove('hidden'); rangeDiv.style.display = 'flex'; } 
            else { rangeDiv.classList.add('hidden'); rangeDiv.style.display = 'none'; loadRiwayatDB(); }
        }

        async function loadRiwayatDB() {
            if(!supabaseClient) return;
            const filter = document.getElementById('filterWaktu').value;
            const container = document.getElementById('riwayatDbContainer');
            container.innerHTML = '<p class="text-center text-xs text-gray-500 py-4 italic">Memuat data...</p>';

            let query = supabaseClient.from('rekap_pengiriman').select('*').order('created_at', { ascending: true });
            const today = new Date();
            
            if (filter === 'hari_ini') query = query.eq('tanggal', formatTglDB(today));
            else if (filter === 'kemarin') {
                let yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
                query = query.eq('tanggal', formatTglDB(yesterday));
            } else if (filter === 'tiga_hari') {
                let threeDaysAgo = new Date(today); threeDaysAgo.setDate(threeDaysAgo.getDate() - 2);
                query = query.gte('tanggal', formatTglDB(threeDaysAgo)).lte('tanggal', formatTglDB(today));
            } else if (filter === 'rentang') {
                const start = document.getElementById('startDate').value;
                const end = document.getElementById('endDate').value;
                if(start && end) query = query.gte('tanggal', start).lte('tanggal', end);
                else return container.innerHTML = '<p class="text-center text-xs text-red-500 py-4">Pilih tanggal mulai dan akhir terlebih dahulu.</p>';
            }

            const { data, error } = await query;
            if(error) return container.innerHTML = '<p class="text-center text-xs text-red-500 py-4">Gagal memuat riwayat.</p>';

            dataRiwayatDB = data || [];

            if(dataRiwayatDB.length === 0) return container.innerHTML = `<div class="bg-gray-50 dark:bg-gray-800/50 p-4 rounded-lg text-center"><p class="text-sm text-gray-400 italic">Tidak ada pengiriman untuk filter ini.</p></div>`;

            container.innerHTML = '';
            let dataForUI = [...dataRiwayatDB].reverse(); 
            
            // DESAIN MINIMALIS DATABASE
            dataForUI.forEach((item) => {
                const parts = item.tanggal.split('-'); 
                const tglIndo = `${parts[2]}/${parts[1]}/${parts[0]}`; 
                
                container.innerHTML += `
                    <div class="bg-white dark:bg-gray-800 py-2 px-2.5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 fade-in relative overflow-hidden mb-1.5">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-gray-400"></div>
                        <div class="pl-1.5 flex flex-col">
                            <div class="flex justify-between items-center mb-0.5">
                                <span class="font-bold text-xs text-gray-800 dark:text-gray-100 truncate pr-2">${item.agen}</span>
                                <div class="flex items-center space-x-1.5 shrink-0">
                                    <span class="text-[9px] bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded text-gray-600 dark:text-gray-300 font-bold">${tglIndo}</span>
                                    <button onclick="bukaEditModal(${item.id})" class="text-primary hover:text-blue-700 bg-blue-50 hover:bg-blue-100 dark:bg-gray-700 dark:hover:bg-gray-600 rounded p-1 transition" title="Edit Data">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flex flex-wrap gap-x-3 gap-y-0.5 text-[10px] text-gray-600 dark:text-gray-400 leading-tight">
                                <p>Mbl: <span class="font-medium text-gray-900 dark:text-gray-200">${item.mobil}</span></p>
                                <p>Drv: <span class="font-medium text-gray-900 dark:text-gray-200">${item.driver}</span></p>
                                <p>Co: <span class="font-medium text-gray-900 dark:text-gray-200">${item.codriver || '-'}</span></p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // --- 5. LOGIC MODAL EDIT & HAPUS ---
        function bukaEditModal(id) {
            currentEditId = id;
            const item = dataRiwayatDB.find(x => x.id === id);
            if(!item) return;

            document.getElementById('editAgen').value = item.agen;
            document.getElementById('editMobil').value = item.mobil;
            document.getElementById('editDriver').value = item.driver;
            
            const editCo = document.getElementById('editCodriver');
            editCo.value = item.codriver ? item.codriver : "- Kosong -";

            const modal = document.getElementById('modalEdit');
            const content = document.getElementById('modalEditContent');
            modal.classList.remove('hidden'); modal.style.display = 'flex';
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        function tutupEditModal() {
            const modal = document.getElementById('modalEdit');
            const content = document.getElementById('modalEditContent');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); modal.style.display = ''; currentEditId = null; }, 300);
        }

        async function simpanEdit() {
            const btn = document.getElementById('btnSimpanEdit');
            btn.innerHTML = 'Menyimpan...'; btn.disabled = true;

            const agen = document.getElementById('editAgen').value;
            const mobil = document.getElementById('editMobil').value;
            const driver = document.getElementById('editDriver').value;
            const codriverVal = document.getElementById('editCodriver').value;
            const codriver = (codriverVal === '- Kosong -' || !codriverVal) ? '' : codriverVal;

            try {
                const { error } = await supabaseClient.from('rekap_pengiriman').update({ agen: agen, mobil: mobil, driver: driver, codriver: codriver }).eq('id', currentEditId);
                if (error) throw error;
                tutupEditModal(); loadRiwayatDB(); 
            } catch (error) { alert('Gagal mengedit data: ' + error.message); } 
            finally { btn.innerHTML = 'Simpan Perubahan'; btn.disabled = false; }
        }

        async function hapusDataDB() {
            const confirmHapus = confirm("Apakah Anda yakin ingin menghapus data riwayat ini permanen?");
            if (!confirmHapus) return;

            const btn = document.getElementById('btnHapusDB');
            btn.innerHTML = 'Menghapus...'; btn.disabled = true;

            try {
                const { error } = await supabaseClient.from('rekap_pengiriman').delete().eq('id', currentEditId);
                if (error) throw error;
                tutupEditModal(); loadRiwayatDB(); 
            } catch (error) { alert('Gagal menghapus data: ' + error.message); } 
            finally { btn.innerHTML = 'Hapus Data Riwayat'; btn.disabled = false; }
        }

        // --- 6. LOGIC PRATINJAU DARI DATABASE ---
        function tampilkanPratinjau() {
            if(dataRiwayatDB.length === 0) return alert('Tidak ada riwayat untuk dicetak. Pastikan antrean sudah Anda simpan ke database.');

            const filter = document.getElementById('filterWaktu').value;
            let strTgl = "";
            const tglOptions = { day: '2-digit', month: '2-digit', year: 'numeric' };

            if (filter === 'hari_ini') strTgl = new Date().toLocaleDateString('id-ID', tglOptions);
            else if (filter === 'kemarin') {
                let y = new Date(); y.setDate(y.getDate() - 1); strTgl = y.toLocaleDateString('id-ID', tglOptions);
            } else if (filter === 'tiga_hari') strTgl = "3 HARI TERAKHIR";
            else if (filter === 'rentang') {
                const s = document.getElementById('startDate').nextElementSibling.value;
                const e = document.getElementById('endDate').nextElementSibling.value;
                strTgl = `${s} s/d ${e}`;
            }
            
            document.getElementById('strukTanggal').innerText = strTgl;

            const containerStruk = document.getElementById('strukDaftarKiriman');
            containerStruk.innerHTML = '';
            
            dataRiwayatDB.forEach((item, i) => {
                let infoTambahanTgl = '';
                if(filter === 'tiga_hari' || filter === 'rentang') {
                    const p = item.tanggal.split('-'); infoTambahanTgl = ` <span class="text-[9px] font-normal">(${p[2]}/${p[1]})</span>`;
                }

                containerStruk.innerHTML += `
                    <div class="mb-2 ${i !== dataRiwayatDB.length - 1 ? 'border-b border-black border-dotted pb-2' : ''}">
                        <div class="font-bold flex items-start space-x-1 mb-1">
                            <span class="w-4 text-right">${i + 1}.</span>
                            <span class="flex-1 uppercase">${item.agen}${infoTambahanTgl}</span>
                        </div>
                        <div class="pl-6 text-[11px] space-y-0.5">
                            <div class="flex"><span class="w-16">Mobil</span><span>: ${item.mobil}</span></div>
                            <div class="flex"><span class="w-16">Driver</span><span>: ${item.driver}</span></div>
                            <div class="flex"><span class="w-16">Co-Driver</span><span>: ${item.codriver || '-'}</span></div>
                        </div>
                    </div>
                `;
            });

            const modal = document.getElementById('modalPreview');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden'); modal.style.display = 'flex';
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('translate-y-full'); }, 10);
        }

        function tutupPratinjau() {
            const modal = document.getElementById('modalPreview');
            const content = document.getElementById('modalContent');
            modal.classList.add('opacity-0'); content.classList.add('translate-y-full');
            setTimeout(() => { modal.classList.add('hidden'); modal.style.display = ''; }, 300);
        }

        // --- 7. SIMPAN KE DATABASE ---
        async function simpanKeDatabase() {
            if(listRekapan.length === 0) return alert('Tidak ada antrean kiriman baru yang perlu disimpan.');
            if(!supabaseClient) return alert('Koneksi database tidak tersedia.');

            const btn = document.getElementById('btnSimpanDB');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Menyimpan...'; btn.disabled = true;

            try {
                const dataToInsert = listRekapan.map(item => ({
                    tanggal: item.tanggal, agen: item.agen,
                    driver: item.driver, codriver: item.codriver, mobil: item.mobil
                }));

                const { data, error } = await supabaseClient.from('rekap_pengiriman').insert(dataToInsert);
                if (error) throw error;

                alert('Berhasil! Antrean telah disimpan ke database.');
                listRekapan = []; renderDraft(); loadRiwayatDB();
            } catch (error) {
                alert('Gagal menyimpan data: ' + error.message);
            } finally {
                btn.innerHTML = originalText; btn.disabled = false;
            }
        }

        function simpanPNG() {
            const struk = document.getElementById('areaStruk');
            struk.style.border = "1px solid #ccc";
            
            html2canvas(struk, { scale: 3, backgroundColor: "#ffffff" }).then(canvas => {
                const link = document.createElement('a');
                const safeName = document.getElementById('strukTanggal').innerText.replace(/\//g, '-');
                link.download = `Rekap_Pengiriman_${safeName}.png`;
                link.href = canvas.toDataURL('image/png'); link.click();
                struk.style.border = "none";
            });
        }

        // --- 8. LOGIC BLUETOOTH PRINTING ---
        async function cetakBluetooth(maxChars = 32) {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                }).catch(e => {
                    return navigator.bluetooth.requestDevice({
                        acceptAllDevices: true, optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                    });
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb'); 

                const strTanggal = document.getElementById('strukTanggal').innerText;
                const filter = document.getElementById('filterWaktu').value;
                
                let lines = [];
                lines.push("SBR PUTRA FOOD"); lines.push("REKAP PENGIRIMAN");
                lines.push("-".repeat(maxChars)); lines.push(`TGL: ${strTanggal}`); lines.push("-".repeat(maxChars));
                
                dataRiwayatDB.forEach((item, i) => {
                    let namaAgen = item.agen.toUpperCase();
                    if(filter === 'tiga_hari' || filter === 'rentang') {
                        const p = item.tanggal.split('-'); namaAgen += ` (${p[2]}/${p[1]})`;
                    }
                    if(namaAgen.length > (maxChars - 4)) namaAgen = namaAgen.substring(0, maxChars - 4);
                    
                    lines.push(`${i+1}. ${namaAgen}`);
                    lines.push(`   Mobil  : ${item.mobil}`);
                    lines.push(`   Driver : ${item.driver}`);
                    
                    if(item.codriver) lines.push(`   Co-Drv : ${item.codriver}`);
                    if(i !== dataRiwayatDB.length - 1) lines.push("   " + "-".repeat(maxChars - 3));
                });
                
                lines.push("-".repeat(maxChars)); lines.push("       Mengetahui,");
                lines.push(""); lines.push(""); lines.push("    Admin / Logistik");
                lines.push(""); lines.push(""); lines.push(""); 

                let text = lines.join("\n"); let encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(text));
                
                alert('Berhasil mengirim perintah ke printer Bluetooth!');
            } catch (error) {
                alert('Gagal cetak Bluetooth: ' + error.message + '\n\nPastikan GPS/Lokasi menyala dan printer sudah dipairing.');
            }
        }
    </script>
