<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekap Pengiriman - SBR Putra Food</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- html2canvas for PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <style>
        .receipt-scroll::-webkit-scrollbar { width: 5px; }
        .receipt-scroll::-webkit-scrollbar-track { background: transparent; }
        .receipt-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .receipt-scroll::-webkit-scrollbar-thumb { background: #475569; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Font khusus untuk struk */
        .font-struk {
            font-family: 'Consolas', 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans min-h-screen relative pb-44 transition-colors duration-300">

    <div class="max-w-md mx-auto p-5 space-y-5">
        
        <!-- Header -->
        <div class="text-center pb-2 border-b border-gray-200 dark:border-gray-700">
            <h1 class="text-2xl font-extrabold tracking-tight text-gray-900 dark:text-white">SBR Putra Food</h1>
            <h2 class="text-md font-medium text-gray-500 dark:text-gray-400">Rekap Pengiriman Harian</h2>
        </div>

        <!-- Wrapper untuk merekatkan Kotak Tanggal dan Input Form -->
        <div class="space-y-2">
            <!-- Date Input & Tombol Manajemen -->
            <div class="flex items-center space-x-3 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 relative">
                <label for="tanggal" class="font-semibold whitespace-nowrap text-sm">Tanggal :</label>
                <input type="text" id="tanggal" class="flex-1 px-3 py-1.5 bg-transparent border-b-2 border-gray-200 dark:border-gray-600 focus:outline-none focus:border-primary text-sm font-medium">
                
                <!-- Tombol Manajemen Data Berwarna Gold -->
                <button onclick="bukaManajemen()" class="p-2 bg-yellow-100 text-yellow-600 dark:bg-yellow-900/40 dark:text-yellow-500 rounded-lg hover:bg-yellow-200 dark:hover:bg-yellow-900/60 transition active:scale-95 shadow-sm" title="Manajemen Data Agen/Kendaraan/Driver">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>

            <!-- Input Form Section -->
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <select id="agen" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"></select>
                    <select id="mobil" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"></select>
                    <select id="driver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"></select>
                    <select id="codriver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"></select>
                </div>

                <!-- UPDATE FITUR: Button Lebih Simple -->
                <button onclick="tambahKiriman()" class="w-full bg-blue-100 text-blue-700 hover:bg-blue-200 dark:bg-blue-900/40 dark:text-blue-400 dark:hover:bg-blue-900/60 font-bold py-3 rounded-lg text-sm transition-colors active:scale-[0.98]">
                    + Tambah Kiriman
                </button>
            </div>
        </div>

        <!-- Draft Antrean -->
        <div id="draftSection" class="pt-2 hidden">
            <h2 class="text-sm font-bold text-primary mb-2 px-1">Antrean Belum Disimpan</h2>
            <div class="border border-blue-200 dark:border-blue-900/50 bg-blue-50/50 dark:bg-gray-800 rounded-xl p-2">
                <div id="draftContainer" class="space-y-2 max-h-[220px] overflow-y-auto receipt-scroll pr-1">
                    <!-- Draft items -->
                </div>
            </div>
        </div>

        <!-- History Section Dari Database -->
        <div class="pt-2 border-t border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between mb-2 px-1">
                <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100">Riwayat</h2>
                <select id="filterWaktu" onchange="handleFilterChange()" class="text-xs font-medium bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md px-2 py-1.5 outline-none focus:ring-2 focus:ring-primary text-gray-700 dark:text-gray-300">
                    <option value="hari_ini">Hari Ini</option>
                    <option value="kemarin">Kemarin</option>
                    <option value="tiga_hari">3 Hari Terakhir</option>
                    <option value="rentang">Pilih Rentang...</option>
                </select>
            </div>
            
            <div id="dateRangeDiv" class="hidden flex-wrap gap-2 mb-3 p-2 bg-gray-100 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                <div class="flex w-full items-center space-x-2">
                    <input type="text" id="startDate" placeholder="Mulai" class="flex-1 text-xs p-1.5 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200 outline-none text-center">
                    <span class="text-xs font-bold text-gray-500">sd</span>
                    <input type="text" id="endDate" placeholder="Akhir" class="flex-1 text-xs p-1.5 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200 outline-none text-center">
                </div>
                <button onclick="loadRiwayatDB()" class="w-full bg-primary text-white text-xs py-2 rounded-md font-bold mt-1">Cari Data</button>
            </div>
            
            <!-- Flatbox Riwayat -->
            <div class="border border-gray-200 dark:border-gray-700 bg-gray-100/50 dark:bg-gray-800/50 rounded-xl p-2">
                <div id="riwayatDbContainer" class="space-y-1.5 max-h-[300px] overflow-y-auto receipt-scroll pr-1">
                    <p class="text-center text-xs text-gray-500 py-4 italic">Memuat data...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Action Button -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-700 p-4 pb-6 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-10">
        <div class="max-w-md mx-auto flex space-x-3">
            <button onclick="simpanKeDatabase()" id="btnSimpanDB" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-2 rounded-xl shadow-md transition transform active:scale-[0.98] flex items-center justify-center space-x-1.5">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                <span class="text-sm">Simpan DB</span>
            </button>
            <button onclick="tampilkanPratinjau()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-2 rounded-xl shadow-lg transition transform active:scale-[0.98] flex items-center justify-center space-x-1.5">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                <span class="text-sm">Pratinjau</span>
            </button>
        </div>
    </div>

    <!-- Modals for Edit Draft & DB -->
    <div id="modalEditDraft" class="fixed inset-0 bg-black/70 z-50 hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300 px-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl p-5 transform scale-95 transition-transform duration-300 shadow-2xl" id="modalEditDraftContent">
            <h3 class="font-bold text-lg mb-4 text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-2">Edit / Hapus Antrean</h3>
            <div class="space-y-3 mb-6">
                <select id="editDraftAgen" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg"></select>
                <select id="editDraftMobil" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg"></select>
                <select id="editDraftDriver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg"></select>
                <select id="editDraftCodriver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg"></select>
            </div>
            <div class="flex flex-col space-y-2.5">
                <button onclick="simpanEditDraft()" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition">Simpan Perubahan</button>
                <button onclick="hapusDraftModal()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition">Hapus Dari Antrean</button>
                <button onclick="tutupEditDraftModal()" class="w-full bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-bold py-3 rounded-xl transition">Batal</button>
            </div>
        </div>
    </div>

    <div id="modalEdit" class="fixed inset-0 bg-black/70 z-50 hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300 px-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl p-5 transform scale-95 transition-transform duration-300 shadow-2xl" id="modalEditContent">
            <h3 class="font-bold text-lg mb-4 text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-2">Edit / Hapus Riwayat Database</h3>
            <div class="space-y-3 mb-6">
                <select id="editAgen" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg"></select>
                <select id="editMobil" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg"></select>
                <select id="editDriver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg"></select>
                <select id="editCodriver" class="w-full px-2 py-2 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg"></select>
            </div>
            <div class="flex flex-col space-y-2.5">
                <button onclick="simpanEdit()" id="btnSimpanEdit" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition">Simpan Perubahan</button>
                <button onclick="hapusDataDB()" id="btnHapusDB" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition">Hapus Data Riwayat</button>
                <button onclick="tutupEditModal()" class="w-full bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-bold py-3 rounded-xl transition">Batal</button>
            </div>
        </div>
    </div>

    <!-- UPDATE FITUR: PRATINJAU LEBIH ENAK DILIHAT (Sesuai Referensi Gambar) -->
    <div id="modalPreview" class="fixed inset-0 bg-black/80 z-50 hidden flex-col justify-end opacity-0 transition-opacity duration-300">
        <div class="bg-gray-100 dark:bg-gray-900 w-full rounded-t-3xl pt-5 pb-8 px-4 flex flex-col h-[90vh] transform translate-y-full transition-transform duration-300" id="modalContent">
            <div class="flex justify-between items-center mb-4 px-2 shrink-0">
                <h3 class="font-bold text-lg text-gray-900 dark:text-white">Pratinjau Struk</h3>
                <button onclick="tutupPratinjau()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition">
                    <svg class="w-5 h-5 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto receipt-scroll flex justify-center mb-6 pt-2">
                <!-- Area Struk yang Didesain Ulang -->
                <div id="areaStruk" class="bg-white p-5 shadow-sm w-[340px] text-black font-struk leading-snug relative rounded mx-auto" style="min-height: 400px;">
                    <div class="text-center pb-2">
                        <h2 class="text-[17px] font-bold uppercase tracking-wider text-black">SBR PUTRA FOOD</h2>
                        <p class="text-[12px] font-bold mt-1.5 tracking-wide text-black">REKAP PENGIRIMAN</p>
                    </div>
                    
                    <!-- UPDATE FITUR: Garis di atas tanggal dihilangkan -->
                    <!-- TGL dihapus, Tanggal rata tengah -->
                    <div class="font-bold text-center text-[14px] pb-1.5 text-black" id="strukTanggal"></div>
                    
                    <div class="border-b-[1.5px] border-black mb-3 border-dashed"></div>
                    
                    <div id="strukDaftarKiriman" class="space-y-0 text-black">
                        <!-- Items go here -->
                    </div>
                    
                    <!-- Footer Struk -->
                    <div class="text-center text-black mt-2">
                        <p class="text-[13px] mb-10">Mengetahui,</p>
                        <p class="font-bold inline-block px-5 pb-1 text-[13px]" style="border-bottom: 1.5px solid black;">Admin / Logistik</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 shrink-0 px-2">
                <button onclick="simpanPNG()" class="col-span-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md flex items-center justify-center space-x-2 transition active:scale-[0.98]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span>Simpan sbg Gambar (PNG)</span>
                </button>
                <button onclick="cetakBluetooth(32)" class="bg-gray-800 dark:bg-gray-700 hover:bg-gray-900 text-white font-bold py-3 rounded-xl shadow-md transition active:scale-[0.98] text-sm">Cetak BT (58mm)</button>
                <button onclick="cetakBluetooth(48)" class="bg-gray-800 dark:bg-gray-700 hover:bg-gray-900 text-white font-bold py-3 rounded-xl shadow-md transition active:scale-[0.98] text-sm">Cetak BT (80mm)</button>
            </div>
        </div>
    </div>

    <!-- Modal Manajemen -->
    <div id="modalManajemen" class="fixed inset-0 bg-black/70 z-50 hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300 px-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl p-5 transform scale-95 transition-transform duration-300 shadow-2xl" id="modalManajemenContent">
            <h3 class="font-bold text-lg mb-5 text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-3 flex items-center gap-2">
                <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Manajemen Data Utama
            </h3>
            <div class="flex flex-col space-y-3.5">
                <button onclick="bukaDataMaster('agen')" class="w-full flex items-center justify-between bg-blue-50 text-blue-700 dark:bg-gray-700 dark:text-blue-400 font-bold py-3 px-4 rounded-xl shadow-sm border border-blue-100 dark:border-gray-600 transition hover:bg-blue-100 active:scale-[0.98]">
                    <span>Data Agen</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
                <button onclick="bukaDataMaster('driver')" class="w-full flex items-center justify-between bg-blue-50 text-blue-700 dark:bg-gray-700 dark:text-blue-400 font-bold py-3 px-4 rounded-xl shadow-sm border border-blue-100 dark:border-gray-600 transition hover:bg-blue-100 active:scale-[0.98]">
                    <span>Data Driver / Co</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
                <button onclick="bukaDataMaster('mobil')" class="w-full flex items-center justify-between bg-blue-50 text-blue-700 dark:bg-gray-700 dark:text-blue-400 font-bold py-3 px-4 rounded-xl shadow-sm border border-blue-100 dark:border-gray-600 transition hover:bg-blue-100 active:scale-[0.98]">
                    <span>Data Mobil</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
                <div class="border-t border-gray-200 dark:border-gray-700 pt-2 mt-2">
                    <button onclick="tutupManajemen()" class="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 text-gray-800 dark:text-gray-200 font-bold py-3 rounded-xl transition active:scale-[0.98]">Kembali</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Data Master (Table) -->
    <div id="modalDataMaster" class="fixed inset-0 bg-black/70 z-50 hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300 px-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-2xl p-4 transform scale-95 transition-transform duration-300 shadow-2xl flex flex-col h-[75vh]" id="modalDataMasterContent">
            <div class="flex justify-between items-center mb-3 border-b border-gray-200 dark:border-gray-700 pb-2 shrink-0">
                <h3 id="masterTitle" class="font-bold text-lg text-gray-900 dark:text-white">Data Master</h3>
                <button onclick="tutupDataMaster()" class="p-1.5 text-gray-400 hover:text-red-500 transition rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto mb-3 receipt-scroll border border-gray-100 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50">
                <table class="w-full text-sm text-left text-gray-600 dark:text-gray-300">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-200 dark:bg-gray-700 dark:text-gray-300 sticky top-0 z-10">
                        <tr>
                            <th scope="col" class="px-3 py-2.5">Nama / Entitas</th>
                            <th scope="col" class="px-3 py-2.5 text-right w-16">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="masterTableBody" class="divide-y divide-gray-200 dark:divide-gray-700">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
            
            <div class="flex space-x-2 shrink-0">
                <button onclick="bukaFormMaster()" class="flex-1 bg-primary hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition active:scale-[0.98] text-sm flex items-center justify-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Tambah Baru
                </button>
                <button onclick="tutupDataMaster()" class="w-1/3 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-bold py-3 rounded-xl transition active:scale-[0.98] text-sm">Kembali</button>
            </div>
        </div>
    </div>

    <!-- Modal Form Tambah/Edit -->

        // --- DRAFT ANTREAN ---
        function tambahKiriman() {
            const agen = document.getElementById('agen').value;

        // --- DATABASE & FILTER ---
        function handleFilterChange() {
            const val = document.getElementById('filterWaktu').value; const rangeDiv = document.getElementById('dateRangeDiv');
            if (val === 'rentang') { rangeDiv.classList.remove('hidden'); rangeDiv.style.display = 'flex'; } 
            else { rangeDiv.classList.add('hidden'); rangeDiv.style.display = 'none'; loadRiwayatDB(); }
        }
        async function loadRiwayatDB() {
            if(!supabaseClient) return;
            const filter = document.getElementById('filterWaktu').value; const container = document.getElementById('riwayatDbContainer');
            container.innerHTML = '<p class="text-center text-xs text-gray-500 py-4 italic">Memuat data...</p>';
            let query = supabaseClient.from('rekap_pengiriman').select('*').order('created_at', { ascending: true });
            const today = new Date();
            if (filter === 'hari_ini') query = query.eq('tanggal', formatTglDB(today));
            else if (filter === 'kemarin') { let y = new Date(today); y.setDate(y.getDate() - 1); query = query.eq('tanggal', formatTglDB(y)); } 
            else if (filter === 'tiga_hari') { let t = new Date(today); t.setDate(t.getDate() - 2); query = query.gte('tanggal', formatTglDB(t)).lte('tanggal', formatTglDB(today)); } 
            else if (filter === 'rentang') {
                const s = document.getElementById('startDate').value; const e = document.getElementById('endDate').value;
                if(s && e) query = query.gte('tanggal', s).lte('tanggal', e); else return container.innerHTML = '<p class="text-center text-xs text-red-500 py-4">Pilih tanggal mulai dan akhir terlebih dahulu.</p>';
            }

            const { data, error } = await query;
            if(error) return container.innerHTML = '<p class="text-center text-xs text-red-500 py-4">Gagal memuat riwayat.</p>';
            dataRiwayatDB = data || [];
            if(dataRiwayatDB.length === 0) return container.innerHTML = `<div class="bg-gray-50 dark:bg-gray-800/50 p-4 rounded-lg text-center"><p class="text-sm text-gray-400 italic">Tidak ada pengiriman untuk filter ini.</p></div>`;

            container.innerHTML = '';
            let dataForUI = [...dataRiwayatDB].reverse(); 
            dataForUI.forEach((item) => {
                const p = item.tanggal.split('-'); const tglIndo = `${p[2]}/${p[1]}/${p[0]}`; 
                container.innerHTML += `
                    <div class="bg-white dark:bg-gray-800 py-2 px-2.5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 fade-in relative overflow-hidden mb-1.5">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-gray-400"></div>
                        <div class="pl-1.5 flex flex-col">

                                    <button onclick="bukaEditModal(${item.id})" class="text-primary hover:text-blue-700 bg-blue-50 hover:bg-blue-100 dark:bg-gray-700 dark:hover:bg-gray-600 rounded p-1 transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" /></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flex flex-wrap gap-x-3 gap-y-0.5 text-[10px] text-gray-600 dark:text-gray-400 leading-tight">

                                <p>Drv: <span class="font-medium text-gray-900 dark:text-gray-200">${item.driver}</span></p>
                                <p>Co: <span class="font-medium text-gray-900 dark:text-gray-200">${item.codriver || '-'}</span></p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        function bukaEditModal(id) {

            document.getElementById('editAgen').value = item.agen; document.getElementById('editMobil').value = item.mobil;

        async function simpanEdit() {
            const btn = document.getElementById('btnSimpanEdit'); btn.innerHTML = 'Menyimpan...'; btn.disabled = true;
            const agen = document.getElementById('editAgen').value; const mobil = document.getElementById('editMobil').value;
            const driver = document.getElementById('editDriver').value; const cVal = document.getElementById('editCodriver').value;
            const codriver = (cVal === '- Kosong -' || !cVal) ? '' : cVal;
            try {
                const { error } = await supabaseClient.from('rekap_pengiriman').update({ agen: agen, mobil: mobil, driver: driver, codriver: codriver }).eq('id', currentEditId);
                if (error) throw error; tutupEditModal(); loadRiwayatDB(); 
            } catch (error) { alert('Gagal mengedit data: ' + error.message); } finally { btn.innerHTML = 'Simpan Perubahan'; btn.disabled = false; }

        async function hapusDataDB() {

            try {
                const { error } = await supabaseClient.from('rekap_pengiriman').delete().eq('id', currentEditId);
                if (error) throw error; tutupEditModal(); loadRiwayatDB();

        // --- UPDATE FITUR: PRATINJAU LEBIH ENAK DILIHAT ---
        function tampilkanPratinjau() {
            if(dataRiwayatDB.length === 0) return alert('Tidak ada riwayat untuk dicetak. Pastikan antrean sudah Anda simpan ke database.');

            const filter = document.getElementById('filterWaktu').value;
            let strTgl = "";
            if (filter === 'hari_ini') strTgl = formatDateCustom(new Date());
            else if (filter === 'kemarin') { let y = new Date(); y.setDate(y.getDate() - 1); strTgl = formatDateCustom(y); } 
            else if (filter === 'tiga_hari') strTgl = "3 HARI TERAKHIR";
            else if (filter === 'rentang') { 
                const s = document.getElementById('startDate').nextElementSibling.value; // ex: 20/07/2026
                const e = document.getElementById('endDate').nextElementSibling.value; 
                strTgl = `${s} - ${e}`;

            document.getElementById('strukTanggal').innerText = strTgl;

            const containerStruk = document.getElementById('strukDaftarKiriman');
            containerStruk.innerHTML = '';
            
            dataRiwayatDB.forEach((item, i) => {
                let infoTgl = '';
                if(filter === 'tiga_hari' || filter === 'rentang') { const p = item.tanggal.split('-'); infoTgl = ` (${p[2]}/${p[1]})`; }
                
                // Menerapkan gaya dari referensi: angka dihilangkan, garis dashed
                containerStruk.innerHTML += `
                    <div class="py-2.5 border-b border-gray-400 border-dashed">
                        <div class="font-bold uppercase text-[13px] tracking-wide">${item.agen}${infoTgl}</div>
                        <div class="text-[13px] mt-0.5 tracking-tight">M:${item.mobil} | D:${item.driver} | C:${item.codriver || '-'}</div>
                    </div>
                `;
            });

            const modal = document.getElementById('modalPreview');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden'); modal.style.display = 'flex';
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('translate-y-full'); }, 10);
        }

        function tutupPratinjau() {
            const modal = document.getElementById('modalPreview'); const content = document.getElementById('modalContent');
            modal.classList.add('opacity-0'); content.classList.add('translate-y-full'); setTimeout(() => { modal.classList.add('hidden'); modal.style.display = ''; }, 300);
        }

        async function simpanKeDatabase() {
            if(listRekapan.length === 0) return alert('Tidak ada antrean kiriman baru yang perlu disimpan.');
            if(!supabaseClient) return alert('Koneksi database tidak tersedia.');
            const btn = document.getElementById('btnSimpanDB'); const originalText = btn.innerHTML; btn.innerHTML = '<span class="text-sm">Menyimpan...</span>'; btn.disabled = true;
            try {
                const dataToInsert = listRekapan.map(item => ({ tanggal: item.tanggal, agen: item.agen, driver: item.driver, codriver: item.codriver, mobil: item.mobil }));
                const { data, error } = await supabaseClient.from('rekap_pengiriman').insert(dataToInsert);
                if (error) throw error; alert('Berhasil! Antrean telah disimpan ke database.'); listRekapan = []; renderDraft(); loadRiwayatDB();
            } catch (error) { alert('Gagal menyimpan data: ' + error.message); } finally { btn.innerHTML = originalText; btn.disabled = false; }
        }

        // --- UPDATE FITUR: SIMPAN PNG DENGAN ALERT DIALOG ---
        function tampilkanAlertLoading(msg) {

            document.getElementById('alertBtn').classList.remove('hidden');

        function tutupAlert() {
            const m = document.getElementById('modalAlert'); const c = document.getElementById('modalAlertContent');
            m.classList.add('opacity-0'); c.classList.add('scale-95'); 
            setTimeout(() => { m.classList.add('hidden'); m.style.display = ''; }, 300);
        }

        function simpanPNG() {
            tampilkanAlertLoading("Sedang memproses gambar...");
            
            setTimeout(() => {
                const struk = document.getElementById('areaStruk');
                struk.style.border = "1px solid #ccc";
                
                html2canvas(struk, { scale: 3, backgroundColor: "#ffffff" }).then(canvas => {
                    const link = document.createElement('a'); 
                    const safeName = document.getElementById('strukTanggal').innerText.replace(/\//g, '-').replace(/ /g, '_');
                    link.download = `Rekap_Pengiriman_${safeName}.png`; 
                    link.href = canvas.toDataURL('image/png'); 
                    link.click(); 
                    
                    struk.style.border = "none";
                    tampilkanAlertBerhasil("Berhasil!", "Gambar struk berhasil disimpan ke galeri/unduhan Anda.");
                }).catch(err => {
                    struk.style.border = "none";
                    tutupAlert();
                    alert("Gagal menyimpan gambar: " + err);
                });
            }, 600); // Jeda sejenak agar animasi loading muncul
        }

        // --- BLUETOOTH PRINTING ---
        async function cetakBluetooth(maxChars = 32) {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }], optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb'] }).catch(e => { return navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb'] }); });
                const server = await device.gatt.connect(); const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb'); const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb'); 
                const strTanggal = document.getElementById('strukTanggal').innerText; const filter = document.getElementById('filterWaktu').value;
                
                let lines = [];
                // Helper rata tengah
                const centerText = (text, width) => {
                    const pad = Math.max(0, Math.floor((width - text.length) / 2));
                    return " ".repeat(pad) + text;
                };

                lines.push(centerText("SBR PUTRA FOOD", maxChars)); 
                lines.push(centerText("REKAP PENGIRIMAN", maxChars)); 
                lines.push(""); // Spasi
                lines.push(centerText(strTanggal, maxChars)); 
                lines.push("-".repeat(maxChars));
                
                dataRiwayatDB.forEach((item, i) => {
                    let infoTgl = ""; if(filter === 'tiga_hari' || filter === 'rentang') { const p = item.tanggal.split('-'); infoTgl = ` (${p[2]}/${p[1]})`; }
                    lines.push(`${item.agen.toUpperCase()}${infoTgl}`.substring(0, maxChars));
                    lines.push(`M:${item.mobil} | D:${item.driver} | C:${item.codriver || '-'}`.substring(0, maxChars));
                    lines.push("-".repeat(maxChars)); 
                });
                
                lines.push("");
                lines.push(centerText("Mengetahui,", maxChars)); 
                lines.push("\n\n");
                lines.push(centerText("Admin / Logistik", maxChars)); 
                lines.push("-".repeat(maxChars));
                
                let teksFooter = "*** AKHIR CETAK ***"; lines.push(centerText(teksFooter, maxChars)); lines.push("\n\n\n\n"); 
                let text = lines.join("\n"); let encoder = new TextEncoder(); let data = encoder.encode(text);
                let chunkSize = 20; 
                for (let i = 0; i < data.length; i += chunkSize) { let chunk = data.slice(i, i + chunkSize); await characteristic.writeValue(chunk); await new Promise(resolve => setTimeout(resolve, 100)); }
                alert('Berhasil mengirim perintah ke printer Bluetooth!');
            } catch (error) { alert('Gagal cetak Bluetooth: ' + error.message + '\n\nPastikan GPS/Lokasi menyala dan printer sudah dipairing.'); }
        }

        // --- MANAJEMEN DATA ---
        function bukaManajemen() { const m = document.getElementById('modalManajemen'); const c = document.getElementById('modalManajemenContent'); m.classList.remove('hidden'); m.style.display = 'flex'; setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); }, 10); }
        function tutupManajemen() { const m = document.getElementById('modalManajemen'); const c = document.getElementById('modalManajemenContent'); m.classList.add('opacity-0'); c.classList.add('scale-95'); setTimeout(() => { m.classList.add('hidden'); m.style.display = ''; }, 300); }

        async function bukaDataMaster(type) {
            currentMasterType = type;
            let title = ''; if(type === 'agen') title = 'Daftar Agen'; if(type === 'driver') title = 'Daftar Driver / Co-Driver'; if(type === 'mobil') title = 'Daftar Mobil';
            document.getElementById('masterTitle').innerText = title; tutupManajemen();
            const m = document.getElementById('modalDataMaster'); const c = document.getElementById('modalDataMasterContent');
            m.classList.remove('hidden'); m.style.display = 'flex'; setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); }, 10);
            await loadDataMasterList();
        }

        function tutupDataMaster() { const m = document.getElementById('modalDataMaster'); const c = document.getElementById('modalDataMasterContent'); m.classList.add('opacity-0'); c.classList.add('scale-95'); setTimeout(() => { m.classList.add('hidden'); m.style.display = ''; bukaManajemen(); }, 300); }
        
        async function loadDataMasterList() {
            const tbody = document.getElementById('masterTableBody'); tbody.innerHTML = '<tr><td colspan="2" class="text-center py-6 text-sm text-gray-500 font-medium">Memuat data dari database...</td></tr>';
            if(!supabaseClient) return tbody.innerHTML = '<tr><td colspan="2" class="text-center py-6 text-sm text-red-500 font-bold">Koneksi Database Gagal</td></tr>';
            try {
                let tableName = '', columnName = '';
                if(currentMasterType === 'agen') { tableName = 'data-agen'; columnName = 'nama_agen'; }
                if(currentMasterType === 'driver') { tableName = 'driver-list'; columnName = 'nama_karyawan'; }
                if(currentMasterType === 'mobil') { tableName = 'data-kendaraan'; columnName = 'tipe_mobil'; }

                const { data, error } = await supabaseClient.from(tableName).select(`id, ${columnName}`).order(columnName, { ascending: true });
                if(error) throw error; masterDataList = data || []; tbody.innerHTML = '';
                
                if(masterDataList.length === 0) tbody.innerHTML = '<tr><td colspan="2" class="text-center py-6 text-sm text-gray-500">Data masih kosong.</td></tr>';
                else {
                    masterDataList.forEach(item => {
                        const val = item[columnName]; const safeVal = val.replace(/'/g, "\\'").replace(/"/g, '&quot;'); 
                        tbody.innerHTML += `
                            <tr class="bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                                <td class="px-3 py-3 font-semibold text-gray-800 dark:text-gray-200">${val}</td>
                                <td class="px-3 py-3 text-right">
                                    <button onclick="bukaFormMaster('${item.id}', '${safeVal}')" class="text-xs font-bold bg-blue-100 text-blue-700 dark:bg-gray-700 dark:text-blue-400 px-3 py-1.5 rounded-lg hover:bg-blue-200 transition active:scale-95">Edit</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch(e) { tbody.innerHTML = `<tr><td colspan="2" class="text-center py-6 text-sm text-red-500">${e.message}</td></tr>`; }
        }

        function bukaFormMaster(id = '', currentVal = '') {
            document.getElementById('formMasterId').value = id;
            document.getElementById('formMasterInput').value = currentVal.replace(/&quot;/g, '"');
            
            const titleEl = document.getElementById('formMasterTitle');
            const btnHapus = document.getElementById('btnHapusMaster');
            
            if(id) {
                titleEl.innerText = 'Edit Data';
                btnHapus.classList.remove('hidden');
            } else {
                titleEl.innerText = 'Tambah Data Baru';
                btnHapus.classList.add('hidden');
            }
            
            let label = '';
            if(currentMasterType === 'agen') label = 'Nama Agen';
            if(currentMasterType === 'driver') label = 'Nama Driver';
            if(currentMasterType === 'mobil') label = 'Tipe Mobil / Plat Nomor';
            document.getElementById('formMasterLabel').innerText = label;

            const m = document.getElementById('modalFormMaster'); const c = document.getElementById('modalFormMasterContent');
            m.classList.remove('hidden'); m.style.display = 'flex'; setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); }, 10);
            setTimeout(() => document.getElementById('formMasterInput').focus(), 300);
        }

        function tutupFormMaster() { const m = document.getElementById('modalFormMaster'); const c = document.getElementById('modalFormMasterContent'); m.classList.add('opacity-0'); c.classList.add('scale-95'); setTimeout(() => { m.classList.add('hidden'); m.style.display = ''; }, 300); }

        async function simpanFormMaster() {
            const id = document.getElementById('formMasterId').value; const val = document.getElementById('formMasterInput').value.trim();
            if(!val) return alert('Input data tidak boleh kosong!');
            if(!supabaseClient) return alert('Koneksi Supabase gagal.');

            const btn = document.getElementById('btnSimpanMaster'); btn.innerText = "Menyimpan..."; btn.disabled = true;

            let tableName = '', columnName = '';
            if(currentMasterType === 'agen') { tableName = 'data-agen'; columnName = 'nama_agen'; }
            if(currentMasterType === 'driver') { tableName = 'driver-list'; columnName = 'nama_karyawan'; }
            if(currentMasterType === 'mobil') { tableName = 'data-kendaraan'; columnName = 'tipe_mobil'; }

            try {
                if(id) { const { error } = await supabaseClient.from(tableName).update({ [columnName]: val }).eq('id', id); if(error) throw error; } 
                else { const { error } = await supabaseClient.from(tableName).insert([{ [columnName]: val }]); if(error) throw error; }
                tutupFormMaster(); await loadDataMasterList(); await loadDataDropdown(); 
            } catch(e) { alert('Gagal menyimpan: ' + e.message); } finally { btn.innerText = "Simpan"; btn.disabled = false; }
        }

        async function hapusFormMaster() {
            const id = document.getElementById('formMasterId').value;
            if(!id) return;

            const confirmHapus = confirm("PERINGATAN!\n\nApakah Anda yakin ingin MENGHAPUS data ini secara permanen dari database?");
            if(!confirmHapus) return;

            if(!supabaseClient) return alert('Koneksi Supabase gagal.');
            
            const btn = document.getElementById('btnHapusMaster');
            btn.innerHTML = '<span class="text-xs">Loading...</span>';
            btn.disabled = true;

            let tableName = '';
            if(currentMasterType === 'agen') tableName = 'data-agen';
            if(currentMasterType === 'driver') tableName = 'driver-list';
            if(currentMasterType === 'mobil') tableName = 'data-kendaraan';

            try {
                const { error } = await supabaseClient.from(tableName).delete().eq('id', id);
                if(error) throw error;
                
                tutupFormMaster(); 
                await loadDataMasterList(); 
                await loadDataDropdown(); 
            } catch(e) {
                alert('Gagal menghapus: ' + e.message);
            } finally {
                btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>';
                btn.disabled = false;
            }
        }
    </script>
