<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agen - SBR Putra Food</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-header">
        <h1>Daftar Agen</h1>
    </div>

    <div class="main-container">
        <div class="card">
            <h3>🤝 Status Harga Agen</h3>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Nama Agen</th><th>Wilayah</th><th>Status</th></tr></thead>
                    <tbody>
                        <tr><td>Toko Barokah</td><td>Lembang</td><td style="color: green;">Update</td></tr>
                        <tr><td>Grosir Cemilan</td><td>Bandung Barat</td><td style="color: orange;">Pending</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>Beranda</span></a>
        <a href="agen.html" class="nav-item active"><span class="nav-icon">🤝</span><span>Agen</span></a>
        <a href="#" id="btnLogout" class="nav-item" style="color: #ef4444;"><span class="nav-icon">🚪</span><span>Keluar</span></a>
    </div>

    <script>
        // MASUKKAN KUNCI SUPABASE ANDA DI SINI JUGA:
        const supabase = supabase.createClient("URL_SUPABASE_ANDA", "KUNCI_ANON_ANDA");

        async function cekLogin() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) window.location.href = 'index.html';
        }
        cekLogin();

        document.getElementById('btnLogout').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
