<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - SBR Putra</title>
    <style>
        /* --- PENGATURAN VARIABEL WARNA (TEMA) --- */
        :root {
            --bg-color: #f4f7f6;          
            --text-main: #333333;         
            --text-sub: #666666;          
            --box-bg: #ffffff;            
            --box-active: #e5e7eb;        
            --shadow-color: rgba(0,0,0,0.05);
            --modal-overlay: rgba(0,0,0,0.4);
            --btn-primary: #3b82f6;
            --btn-primary-active: #2563eb;
        }

        /* 1. Tema Gelap Otomatis dari Sistem HP */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;      
                --text-main: #f9fafb;     
                --text-sub: #9ca3af;      
                --box-bg: #1f2937;        
                --box-active: #374151;    
                --shadow-color: rgba(0,0,0,0.25);
                --modal-overlay: rgba(0,0,0,0.7);
            }
        }

        /* 2. Tema Gelap Berdasarkan Jam (Diaktifkan via JavaScript) */
        body.dark-theme-time {
            --bg-color: #111827;
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
            --box-bg: #1f2937;
            --box-active: #374151;
            --shadow-color: rgba(0,0,0,0.25);
            --modal-overlay: rgba(0,0,0,0.7);
        }

        /* --- STYLING UTAMA --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            font-family: sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden; 
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .container {
            max-width: 800px; 
            margin: 0 auto; 
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding-top: 10px;
        }
        
        .header h2 { 
            color: var(--text-main); 
            margin: 0 0 5px 0; 
            font-size: 24px; 
            transition: color 0.4s ease;
        }
        
        .header p { 
            color: var(--text-sub); 
            margin: 0; 
            font-size: 14px; 
            transition: color 0.4s ease;
        }
        
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        .menu-box { 
            background: var(--box-bg); 
            padding: 15px 10px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 6px var(--shadow-color); 
            text-decoration: none; 
            color: var(--text-main); 
            font-weight: bold; 
            font-size: 13px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; 
            transition: transform 0.1s ease, background-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
        }
        
        .menu-box:active { 
            background: var(--box-active); 
            transform: scale(0.95); 
        }
        
        .icon { 
            font-size: 32px; 
            margin-bottom: 10px; 
        }
        
        .logout-btn {
            display: block;
            width: 100%;
            max-width: 400px; 
            margin: 30px auto 0 auto; 
            padding: 15px; 
            background: #dc2626; 
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            transition: background-color 0.1s ease, transform 0.1s ease;
        }

        .logout-btn:active {
            background: #b91c1c; 
            transform: scale(0.98);
        }

        /* --- STYLING MODAL PIN CUSTOM --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay);
            backdrop-filter: blur(3px); /* Efek blur modern di latar belakang */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background: var(--box-bg);
            padding: 25px 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: translateY(-20px) scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.show .modal-box {
            transform: translateY(0) scale(1);
        }

        .modal-box h3 {
            margin: 0 0 15px 0;
            color: var(--text-main);
            font-size: 18px;
        }

        .modal-box input {
            width: 100%;
            padding: 15px;
            font-size: 28px; /* Teks lebih besar */
            text-align: center;
            letter-spacing: 15px; /* Jarak antar bintang/angka renggang */
            border: 2px solid var(--box-active);
            border-radius: 10px;
            background: transparent;
            color: var(--text-main);
            outline: none;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        .modal-box input:focus {
            border-color: var(--btn-primary);
        }

        .modal-error {
            color: #dc2626;
            font-size: 13px;
            margin: 0 0 15px 0;
            min-height: 15px; /* Menjaga tinggi agar tombol tidak lompat saat error muncul */
            display: none;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
        }

        .modal-buttons button:active {
            transform: scale(0.95);
        }

        .btn-cancel {
            background: var(--box-active);
            color: var(--text-main);
        }

        .btn-submit {
            background: var(--btn-primary);
            color: white;
        }

        .btn-submit:active {
            background: var(--btn-primary-active);
        }

        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .menu-box { font-size: 15px; }
            .icon { font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>SBR Putra</h2>
            <p>Kkurnia System</p>
        </div>

        <div class="menu-grid">
            <a href="kasbon-tukang.html" class="menu-box">
                <span class="icon">💸</span>
                Kasbon Tukang
            </a>
            <a href="Belanja_Renovasi.html" class="menu-box butuh-pin">
                <span class="icon">👷‍♂️</span>
                Catatan Proyek
            </a>
            <a href="makroni-naruto.html" class="menu-box">
                <span class="icon">🍥</span>
                Belum Tersedia
            </a>
            <a href="Cetak_Print_Bluetooth" class="menu-box">
                <span class="icon">🧾</span>
                Print AsaL
            </a>
            <a href="basreng-kiwari.html" class="menu-box">
                <span class="icon">🔥</span>
                Belum Tersedia
            </a>
            <!-- Menu yang dikunci (memiliki class 'butuh-pin') -->
            <a href="empit.html" class="menu-box">
                <span class="icon">💖</span>
                Catatan Empit
            </a>
        </div>

        <a href="index.html" class="logout-btn">Keluar (Logout)</a>
    </div>

    <!-- STRUKTUR HTML MODAL PIN -->
    <div id="pinModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Masukkan PIN</h3>
            <!-- type="password" menyembunyikan input, inputmode="numeric" memanggil numpad HP -->
            <input type="password" id="pinInput" inputmode="numeric" maxlength="4" placeholder="••••">
            <p id="pinError" class="modal-error">PIN Salah!</p>
            <div class="modal-buttons">
                <button id="btnCancel" class="btn-cancel">Batal</button>
                <button id="btnSubmit" class="btn-submit">Buka</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Script mendeteksi akses langsung
        if(document.referrer === "") {
            console.log("Halaman diakses langsung.");
        }

        // 2. Script mengatur tema gelap
        function aturTemaOtomatis() {
            const jamSekarang = new Date().getHours();
            const mulaiMalam = 18;
            const mulaiPagi = 6;
            
            if (jamSekarang >= mulaiMalam || jamSekarang < mulaiPagi) {
                document.body.classList.add('dark-theme-time');
            } else {
                document.body.classList.remove('dark-theme-time');
            }
        }
        window.addEventListener('DOMContentLoaded', aturTemaOtomatis);

        // 3. Script untuk Custom Modal PIN
        const PIN_RAHASIA = "5000"; // Ganti dengan PIN Anda
        let linkTujuan = ""; // Variabel untuk menyimpan link tujuan sementara

        const daftarMenu = document.querySelectorAll('.menu-box');
        const modal = document.getElementById('pinModal');
        const inputPin = document.getElementById('pinInput');
        const pesanError = document.getElementById('pinError');
        const tombolBatal = document.getElementById('btnCancel');
        const tombolBuka = document.getElementById('btnSubmit');

        // Fungsi membuka modal
        daftarMenu.forEach(function(menu) {
            menu.addEventListener('click', function(event) {
                if (this.classList.contains('butuh-pin')) {
                    event.preventDefault(); // Tahan link
                    linkTujuan = this.getAttribute('href'); // Simpan tujuan
                    
                    // Reset input & error
                    inputPin.value = "";
                    pesanError.style.display = "none";
                    
                    // Tampilkan modal
                    modal.classList.add('show');
                    
                    // Fokuskan ke kolom input otomatis setelah animasi sebentar
                    setTimeout(() => inputPin.focus(), 100);
                }
            });
        });

        // Fungsi menutup modal
        function tutupModal() {
            modal.classList.remove('show');
            inputPin.value = ""; // Bersihkan input
        }

        // Fungsi memvalidasi PIN
        function validasiPin() {
            if (inputPin.value === PIN_RAHASIA) {
                // Jika benar, pindah halaman
                window.location.href = linkTujuan;
            } else {
                // Jika salah, tampilkan pesan error & kosongkan form
                pesanError.style.display = "block";
                inputPin.value = "";
                inputPin.focus(); // Fokuskan kembali untuk langsung mengetik ulang
            }
        }

        // Deteksi klik tombol Batal dan Buka
        tombolBatal.addEventListener('click', tutupModal);
        tombolBuka.addEventListener('click', validasiPin);

        // Memungkinkan menekan tombol 'Enter' pada keyboard/HP untuk submit
        inputPin.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                validasiPin();
            }
        });
    </script>
</body>
</html>
