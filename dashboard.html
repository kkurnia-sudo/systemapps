<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SBR Putra Food</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
        }
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
        }
        .header h2 { color: #333; margin: 0 0 5px 0; }
        .header p { color: #666; margin: 0; font-size: 14px; }
        
        /* Layout kotak-kotak */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 2 Kolom */
            gap: 15px; 
        }
        .menu-box { 
            background: white; 
            padding: 30px 10px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-decoration: none; 
            color: #333; 
            font-weight: bold; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; /* Membuatnya berbentuk persegi sempurna */
        }
        .menu-box:active { 
            background: #e5e7eb; 
            transform: scale(0.98);
        }
        .icon { 
            font-size: 32px; 
            margin-bottom: 10px; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Dashboard Utama</h2>
        <p>SBR Putra Food</p>
    </div>

    <div class="menu-grid">
        <a href="makroni-naruto.html" class="menu-box">
            <span class="icon">📦</span>
            Stok Makroni Naruto
        </a>
        <a href="aromanis.html" class="menu-box">
            <span class="icon">🍬</span>
            Data Aromanis
        </a>
        <a href="basreng-kiwari.html" class="menu-box">
            <span class="icon">🔥</span>
            Pesanan Basreng Kiwari
        </a>
        <a href="rekap-agen.html" class="menu-box">
            <span class="icon">📊</span>
            Rekap Data Agen
        </a>
    </div>

    <script>
        // Catatan: Karena ini web statis (HTML biasa), keamanan aslinya ada di database.
        // Script ini hanya trik UX kecil, bukan sistem keamanan utama.
        if(document.referrer === "") {
            console.log("Diakses langsung, bukan dari halaman login.");
            // Bisa tambahkan logika redirect kembali ke index.html jika diperlukan
        }
    </script>
</body>
</html>
