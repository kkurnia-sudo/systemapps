<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SBR Putra Food</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
        }
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
        }
        .header h2 { color: #333; margin: 0 0 5px 0; }
        .header p { color: #666; margin: 0; font-size: 14px; }
        
        /* Layout Grid 2 Kolom untuk HP */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        .menu-box { 
            background: white; 
            padding: 20px 10px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-decoration: none; 
            color: #333; 
            font-weight: bold; 
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; 
        }
        .menu-box:active { 
            background: #e5e7eb; 
            transform: scale(0.98);
        }
        .icon { 
            font-size: 32px; 
            margin-bottom: 10px; 
        }
        .logout-btn {
            display: block;
            width: 100%;
            margin-top: 30px;
            padding: 12px;
            background: #dc2626;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>SBR Putra Food</h2>
        <p>Dashboard Operasional</p>
    </div>

    <div class="menu-grid">
        <!-- Tautan menu, href disiapkan untuk halaman index.html lain ke depannya -->
        <a href="makroni-naruto.html" class="menu-box">
            <span class="icon">📦</span>
            Makroni Naruto
        </a>
        <a href="aromanis.html" class="menu-box">
            <span class="icon">🍬</span>
            Aromanis
        </a>
        <a href="basreng-kiwari.html" class="menu-box">
            <span class="icon">🔥</span>
            Basreng Kiwari
        </a>
        <a href="data-agen.html" class="menu-box">
            <span class="icon">👥</span>
            Data Agen
        </a>
    </div>

    <!-- Tombol kembali ke halaman login -->
    <a href="index.html" class="logout-btn">Keluar (Logout)</a>

    <script>
        // UX sederhana: memperingatkan jika halaman diakses langsung tanpa lewat login
        if(document.referrer === "") {
            console.log("Halaman diakses langsung.");
        }
    </script>
</body>
</html>
