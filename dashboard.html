<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - SBR Putra Food</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-header">
        <h1>Dashboard Utama</h1>
        <p style="font-size: 12px; color: #64748b;">SBR Putra Food Management</p>
    </div>

    <div class="main-container">
        <div class="card">
            <h3>📦 Stok Barang Hari Ini</h3>
            <ul style="list-style: none; line-height: 2; font-size: 14px;">
                <li>Makroni Naruto: <span style="color: green; font-weight: bold;">Aman</span></li>
                <li>Aromanis: <span style="color: green; font-weight: bold;">Aman</span></li>
                <li>Basreng Kiwari: <span style="color: orange; font-weight: bold;">Cek Stok</span></li>
            </ul>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><span class="nav-icon">📊</span><span>Beranda</span></a>
        <a href="agen.html" class="nav-item"><span class="nav-icon">🤝</span><span>Agen</span></a>
        <a href="#" id="btnLogout" class="nav-item" style="color: #ef4444;"><span class="nav-icon">🚪</span><span>Keluar</span></a>
    </div>

    <script>
        // MASUKKAN KUNCI SUPABASE ANDA DI SINI JUGA:
        const supabase = supabase.createClient("URL_SUPABASE_ANDA", "KUNCI_ANON_ANDA");

        // Cek apakah sudah login PIN
        async function cekLogin() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) window.location.href = 'index.html';
        }
        cekLogin();

        document.getElementById('btnLogout').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
