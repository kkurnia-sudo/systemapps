<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - SBR Putra</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            font-family: sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden; 
        }

        /* Pembungkus utama agar tidak terlalu melar di layar PC */
        .container {
            max-width: 800px; 
            margin: 0 auto; /* Memposisikan konten di tengah (center) pada PC */
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding-top: 10px;
        }
        .header h2 { color: #333; margin: 0 0 5px 0; font-size: 24px; }
        .header p { color: #666; margin: 0; font-size: 14px; }
        
        /* Layout Default (Untuk HP: 2 Kolom) */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        .menu-box { 
            background: white; 
            padding: 15px 10px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-decoration: none; 
            color: #333; 
            font-weight: bold; 
            font-size: 13px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; 
            transition: transform 0.1s ease, background-color 0.1s ease;
        }
        
        .menu-box:active { 
            background: #e5e7eb; 
            transform: scale(0.95); 
        }
        
        .icon { 
            font-size: 32px; 
            margin-bottom: 10px; 
        }
        
        .logout-btn {
            display: block;
            width: 100%;
            max-width: 400px; /* Batas lebar tombol logout */
            margin: 30px auto 0 auto; /* Posisikan tombol di tengah */
            padding: 15px; 
            background: #dc2626;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            transition: background-color 0.1s ease;
        }

        .logout-btn:active {
            background: #b91c1c; 
        }

        /* --- MEDIA QUERY: ATURAN KHUSUS UNTUK LAYAR PC/TABLET --- */
        @media (min-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(4, 1fr); /* Berubah jadi 4 kolom sejajar di PC */
                gap: 20px;
            }
            .menu-box {
                font-size: 15px; /* Ukuran teks menu sedikit dibesarkan */
            }
            .icon {
                font-size: 40px; /* Ikon sedikit dibesarkan di PC */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>SBR Putra</h2>
            <p>Kkurnia System</p>
        </div>

        <div class="menu-grid">
            <a href="kasbon-tukang.html" class="menu-box">
                <span class="icon">💸</span>
                Kasbon Tukang
            </a>
            <a href="data-proyek.html" class="menu-box">
                <span class="icon">👷‍♂️</span>
                Catatan Proyek
            </a>
            <a href="aromanis.html" class="menu-box">
                <span class="icon">🍬</span>
                Belum Tersedia
            </a>
            <a href="basreng-kiwari.html" class="menu-box">
                <span class="icon">🔥</span>
                Belum Tersedia
            </a>
            <a href="empit.html" class="menu-box">
                <span class="icon">💖 </span>
                Catatan Empit
            </a>
        </div>

        <a href="index.html" class="logout-btn">Keluar (Logout)</a>
    </div>

    <script>
        if(document.referrer === "") {
            console.log("Halaman diakses langsung.");
        }
    </script>
</body>
</html>
