<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Kiriman Barang</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        @media (prefers-color-scheme: dark) {
            body { background-color: #111827; color: #f3f4f6; }
            .card-bg { background-color: #1f2937; }
            .input-bg { background-color: #374151; border-color: #4b5563; color: #f3f4f6; }
        }
        @media (prefers-color-scheme: light) {
            body { background-color: #f3f4f6; color: #1f2937; }
            .card-bg { background-color: #ffffff; }
            .input-bg { background-color: #ffffff; border-color: #d1d5db; color: #1f2937; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-5xl mx-auto card-bg p-6 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700">
        <h1 class="text-2xl font-extrabold mb-6 flex items-center gap-2">
            <i class="ph ph-truck text-blue-500"></i> Kiriman Untuk Jambi
        </h1>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="flex flex-col">
                <label class="text-sm font-semibold mb-1 opacity-80">Hari / Tanggal</label>
                <input type="text" id="tanggal" readonly class="input-bg border rounded-lg p-2.5 focus:outline-none cursor-not-allowed opacity-80">
            </div>
            <div class="flex flex-col">
                <label class="text-sm font-semibold mb-1 opacity-80">Mobil</label>
                <input type="text" id="mobil" placeholder="Contoh: D 1234 AB" class="input-bg border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <h2 class="text-lg font-bold mb-4 border-b pb-2 border-gray-200 dark:border-gray-700">Rincian Barang & Ceklis</h2>
        
        <div class="overflow-x-auto pb-4">
            <table class="w-full text-left border-collapse min-w-[800px]">
                <thead>
                    <tr class="text-sm opacity-80">
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-48">Nama Barang</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-24">Qty</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-24">Uom</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600">Keterangan</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-32 border-l-2">Total Terkirim</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-24">Sisa</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-10"></th>
                    </tr>
                </thead>
                <tbody id="item-tbody">
                    <!-- Baris otomatis masuk ke sini -->
                </tbody>
            </table>
        </div>

        <button onclick="tambahBaris()" type="button" class="mt-2 text-sm font-semibold text-blue-500 hover:text-blue-600 flex items-center gap-1 transition cursor-pointer">
            <i class="ph ph-plus-circle text-lg"></i> Tambah Baris
        </button>

        <div class="mt-10 border-t border-gray-200 dark:border-gray-700 pt-6">
            <button onclick="simpanData()" id="btn-simpan" type="button" class="w-full md:w-auto md:px-12 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2">
                <i class="ph ph-floppy-disk text-xl"></i> Simpan Data
            </button>
        </div>
    </div>

    <script>
        // 1. Konfigurasi Client Supabase
        const supabaseUrl = 'https://acpkdnktanrucyfyhckw.supabase.co'; 
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcGtkbmt0YW5ydWN5ZnloY2t3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTE2NzksImV4cCI6MjA5OTc2NzY3OX0.CyBFYglE50qCnnj9gLjj0zDVZG4dmEs6pWYWkJns41U'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        // 2. Daftar Barang Default (Jika Gagal Tarik Data)
        let daftarBarang = ["Makroni Naruto", "Aromanis", "Basreng Kiwari"];

        // 3. Set Tanggal Hari Ini Saat Web Dimuat
        function setTanggalOtomatis() {
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
            const d = new Date();
            const yy = String(d.getFullYear()).slice(-2);
            const dd = String(d.getDate()).padStart(2, '0');
            const mmm = months[d.getMonth()];
            document.getElementById('tanggal').value = `${dd}-${mmm}-${yy}`;
        }

        // 4. Ambil Data Dari Supabase
        async function loadBarangDariSupabase() {
            try {
                const { data, error } = await supabase.from('barang_jambi').select('nama_barang');
                if (error) throw error;
                
                if (data && data.length > 0) {
                    daftarBarang = data.map(item => item.nama_barang);
                }
            } catch (err) {
                console.warn("Gagal menarik daftar barang dari Supabase, menggunakan data default.");
            } finally {
                // Pastikan tabel tidak kosong saat pertama dibuka
                tambahBaris();
            }
        }

        // 5. Fungsi Tambah Baris
        function tambahBaris() {
            const tbody = document.getElementById('item-tbody');
            const tr = document.createElement('tr');
            
            let opsiDropdown = `<option value="">Pilih Barang...</option>`;
            daftarBarang.forEach(item => {
                opsiDropdown += `<option value="${item}">${item}</option>`;
            });

            tr.innerHTML = `
                <td class="p-2"><select class="inp-nama input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500">${opsiDropdown}</select></td>
                <td class="p-2"><input type="number" oninput="kalkulasiSisa(this)" class="inp-qty input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500" placeholder="0"></td>
                <td class="p-2"><input type="text" class="inp-uom input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500" placeholder="pcs/kg"></td>
                <td class="p-2"><input type="text" class="inp-ket input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500" placeholder="..."></td>
                <td class="p-2 border-l-2 border-gray-200 dark:border-gray-700 pl-4"><input type="number" oninput="kalkulasiSisa(this)" class="inp-total input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500" placeholder="0"></td>
                <td class="p-2"><input type="number" readonly class="inp-sisa input-bg border border-transparent rounded w-full p-2 font-bold opacity-80" placeholder="0"></td>
                <td class="p-2 text-center text-red-500 cursor-pointer hover:text-red-700" onclick="hapusBaris(this)"><i class="ph ph-trash text-xl"></i></td>
            `;
            tbody.appendChild(tr);
        }

        // 6. Fungsi Hapus Baris
        function hapusBaris(elemen) {
            elemen.closest('tr').remove();
        }

        // 7. Kalkulasi Sisa
        function kalkulasiSisa(elemen) {
            const baris = elemen.closest('tr');
            const qty = parseFloat(baris.querySelector('.inp-qty').value) || 0;
            const totalTerkirim = parseFloat(baris.querySelector('.inp-total').value) || 0;
            baris.querySelector('.inp-sisa').value = qty - totalTerkirim;
        }

        // 8. Eksekusi Simpan Data
        async function simpanData() {
            const btn = document.getElementById('btn-simpan');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Menyimpan...';
            btn.disabled = true;

            const tgl = document.getElementById('tanggal').value;
            const mbl = document.getElementById('mobil').value;
            const barisTabel = document.querySelectorAll('#item-tbody tr');
            let dataDikirim = [];

            barisTabel.forEach(baris => {
                const nama = baris.querySelector('.inp-nama').value;
                if (nama !== "") { // Hanya ambil baris yang barangnya sudah dipilih
                    dataDikirim.push({
                        tanggal: tgl,
                        mobil: mbl,
                        nama_barang: nama,
                        qty: baris.querySelector('.inp-qty').value || "0",
                        uom: baris.querySelector('.inp-uom').value || "",
                        keterangan: baris.querySelector('.inp-ket').value || "",
                        total_terkirim: baris.querySelector('.inp-total').value || "0",
                        sisa: baris.querySelector('.inp-sisa').value || "0"
                    });
                }
            });

            if (dataDikirim.length === 0) {
                alert("Harap pilih nama barang minimal pada 1 baris!");
                resetTombolSimpan();
                return;
            }

            try {
                const { error } = await supabase.from('table_kirimanjambi').insert(dataDikirim);
                if (error) throw error;
                
                alert('Data berhasil disimpan ke Supabase!');
                
                // Bersihkan form setelah sukses
                document.getElementById('mobil').value = '';
                document.getElementById('item-tbody').innerHTML = '';
                tambahBaris();
            } catch (err) {
                alert("Terjadi kesalahan saat menyimpan: " + err.message);
                console.error(err);
            }

            resetTombolSimpan();
        }

        function resetTombolSimpan() {
            const btn = document.getElementById('btn-simpan');
            btn.innerHTML = '<i class="ph ph-floppy-disk text-xl"></i> Simpan Data';
            btn.disabled = false;
        }

        // --- Inisialisasi Saat Halaman Dimuat ---
        document.addEventListener('DOMContentLoaded', () => {
            setTanggalOtomatis();
            loadBarangDariSupabase();
        });

    </script>
</body>
</html>
