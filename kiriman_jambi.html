<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Kiriman Barang</title>
    <!-- Tailwind CSS untuk styling yang modern & responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Phosphor Icons untuk Ikon (opsional) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Konfigurasi tema untuk support otomatis dark/light mode dari device */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #111827; /* Tailwind gray-900 */
                color: #f3f4f6; /* Tailwind gray-100 */
            }
            .card-bg { background-color: #1f2937; /* Tailwind gray-800 */ }
            .input-bg { background-color: #374151; border-color: #4b5563; color: #f3f4f6; }
        }
        @media (prefers-color-scheme: light) {
            body {
                background-color: #f3f4f6; /* Tailwind gray-100 */
                color: #1f2937; /* Tailwind gray-800 */
            }
            .card-bg { background-color: #ffffff; }
            .input-bg { background-color: #ffffff; border-color: #d1d5db; color: #1f2937; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-5xl mx-auto card-bg p-6 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700">
        <h1 class="text-2xl font-extrabold mb-6 flex items-center gap-2">
            <i class="ph ph-truck text-blue-500"></i> Kiriman Untuk Jambi
        </h1>

        <!-- Bagian Header (Tanggal & Mobil) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="flex flex-col">
                <label class="text-sm font-semibold mb-1 opacity-80">Hari / Tanggal</label>
                <input type="text" id="tanggal" readonly class="input-bg border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-not-allowed opacity-80">
            </div>
            <div class="flex flex-col">
                <label class="text-sm font-semibold mb-1 opacity-80">Mobil</label>
                <input type="text" id="mobil" placeholder="Isi manual (Contoh: D 1234 AB / Driver)" class="input-bg border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <!-- Tabel / List Rincian Barang -->
        <h2 class="text-lg font-bold mb-4 border-b pb-2 border-gray-200 dark:border-gray-700">Rincian Barang & Ceklis</h2>
        
        <div class="overflow-x-auto pb-4">
            <table class="w-full text-left border-collapse min-w-[800px]">
                <thead>
                    <tr class="text-sm opacity-80">
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-48">Nama Barang</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-24">Qty</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-24">Uom</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600">Keterangan</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-32 border-l-2">Total Terkirim</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-24">Sisa</th>
                        <th class="p-2 border-b border-gray-300 dark:border-gray-600 w-10"></th>
                    </tr>
                </thead>
                <tbody id="item-tbody">
                    <!-- Baris akan ditambahkan via JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Tombol Tambah Baris -->
        <button onclick="tambahBaris()" class="mt-2 text-sm font-semibold text-blue-500 hover:text-blue-600 flex items-center gap-1 transition">
            <i class="ph ph-plus-circle text-lg"></i> Tambah Baris
        </button>

        <!-- Tombol Simpan -->
        <div class="mt-10 border-t border-gray-200 dark:border-gray-700 pt-6">
            <button onclick="simpanKeSupabase()" id="btn-simpan" class="w-full md:w-auto md:px-12 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2">
                <i class="ph ph-floppy-disk text-xl"></i> Simpan Data
            </button>
        </div>
    </div>

    <script>
        // --- 1. SET UP TANGGAL OTOMATIS (dd-mmm-yy) ---
        const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
        const d = new Date();
        const yy = String(d.getFullYear()).slice(-2);
        const dd = String(d.getDate()).padStart(2, '0');
        const mmm = months[d.getMonth()];
        document.getElementById('tanggal').value = `${dd}-${mmm}-${yy}`;


        // --- 2. AMBIL DATA NAMA BARANG  ---

        async function fetchDaftarBarang() {
            try {
                const { data, error } = await supabase
                .from('barang_jambi')
                .select('nama_barang');
				
				if (error) throw error;
				
				// Memasukkan hasil dari Supabase ke dalam array daftarBarang
                daftarBarang = data.map(item => item.nama_barang);
				
                // Render baris pertama setelah data siap
                tambahBaris(); 
            } catch (error) {
                console.error("Gagal mengambil data barang dari Supabase:", error);
				// Fallback jika gagal
				daftarBarang = ["Makroni Naruto", "Aromanis", "Basreng Kiwari"];
                tambahBaris();
            }
        }

        // --- 3. LOGIK TABEL BARANG ---
        function tambahBaris() {
            const tbody = document.getElementById('item-tbody');
            const tr = document.createElement('tr');
            
            // Buat opsi dropdown
            let optionsHTML = `<option value="">Pilih Barang...</option>`;
            daftarBarang.forEach(item => {
                optionsHTML += `<option value="${item}">${item}</option>`;
            });

            tr.innerHTML = `
                <td class="p-2"><select class="nama-barang input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500">${optionsHTML}</select></td>
                <td class="p-2"><input type="number" oninput="hitungSisa(this)" class="qty-awal input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500" placeholder="0"></td>
                <td class="p-2"><input type="text" class="uom input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500" placeholder="pcs/kg"></td>
                <td class="p-2"><input type="text" class="keterangan input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500" placeholder="..."></td>
                <td class="p-2 border-l-2 border-gray-200 dark:border-gray-700 pl-4"><input type="number" oninput="hitungSisa(this)" class="total-terkirim input-bg border rounded w-full p-2 focus:ring-2 focus:ring-blue-500" placeholder="0"></td>
                <td class="p-2"><input type="number" readonly class="sisa-output input-bg border border-transparent rounded w-full p-2 font-bold opacity-80" placeholder="0"></td>
                <td class="p-2 text-center text-red-500 cursor-pointer hover:text-red-700" onclick="hapusBaris(this)"><i class="ph ph-trash text-xl"></i></td>
            `;
            tbody.appendChild(tr);
        }

        function hapusBaris(element) {
            element.closest('tr').remove();
        }

        // --- 4. LOGIK HITUNG SISA OTOMATIS ---
        function hitungSisa(element) {
            const row = element.closest('tr');
            const qtyAwal = parseFloat(row.querySelector('.qty-awal').value) || 0;
            const totalTerkirim = parseFloat(row.querySelector('.total-terkirim').value) || 0;
            
            // Rumus: Sisa = Qty Awal - Total Terkirim
            const sisa = qtyAwal - totalTerkirim;
            row.querySelector('.sisa-output').value = sisa;
        }

        // --- 5. KONFIGURASI SUPABASE & SIMPAN DATA ---
        // MASUKKAN KREDENSIAL SUPABASE ANDA DI SINI
        const supabaseUrl = 'https://acpkdnktanrucyfyhckw.supabase.co'; 
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcGtkbmt0YW5ydWN5ZnloY2t3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTE2NzksImV4cCI6MjA5OTc2NzY3OX0.CyBFYglE50qCnnj9gLjj0zDVZG4dmEs6pWYWkJns41U'; 
        
        // Inisialisasi Supabase
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        async function simpanKeSupabase() {
            const btn = document.getElementById('btn-simpan');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Menyimpan...';
            btn.disabled = true;

            const tanggal = document.getElementById('tanggal').value;
            const mobil = document.getElementById('mobil').value;
            const rows = document.querySelectorAll('#item-tbody tr');
            let dataPayload = [];

            rows.forEach(row => {
                const nama_barang = row.querySelector('.nama-barang').value;
                if (!nama_barang) return; // Lewati baris kosong
                
                dataPayload.push({
                    tanggal: tanggal,
                    mobil: mobil,
                    nama_barang: nama_barang,
                    qty: parseFloat(row.querySelector('.qty-awal').value) || 0,
                    uom: row.querySelector('.uom').value,
                    keterangan: row.querySelector('.keterangan').value,
                    total_terkirim: parseFloat(row.querySelector('.total-terkirim').value) || 0,
                    sisa: parseFloat(row.querySelector('.sisa-output').value) || 0
                });
            });

            if (dataPayload.length === 0) {
                alert("Harap isi minimal 1 rincian barang sebelum menyimpan.");
                btn.innerHTML = '<i class="ph ph-floppy-disk text-xl"></i> Simpan Data';
                btn.disabled = false;
                return;
            }

            // Ganti 'tabel_kiriman' dengan nama tabel di database Supabase Anda
            const { data, error } = await supabase
                .from('table_kirimanjambi')
                .insert(dataPayload);

            if (error) {
                alert('Gagal menyimpan: ' + error.message);
                console.error(error);
            } else {
                alert('Data berhasil disimpan ke Supabase!');
                // Reset form (opsional)
                document.getElementById('mobil').value = '';
                document.getElementById('item-tbody').innerHTML = '';
                tambahBaris();
            }

            btn.innerHTML = '<i class="ph ph-floppy-disk text-xl"></i> Simpan Data';
            btn.disabled = false;
        }

        // Jalankan saat pertama kali dimuat
        fetchDaftarBarang();

    </script>
</body>
</html>
